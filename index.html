<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asesmen 360° — Pegadaian</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --ink-950:#062E1E; --ink-900:#0B4A30; --ink-800:#106140; --ink-line: rgba(255,255,255,0.12);
  --paper:#FAF7F0; --paper-dim:#EFEADA; --paper-line: rgba(6,46,30,0.14);
  --gold:#E3A400; --gold-dark:#A97600; --slate:#5B6B60; --slate-light:#8FA79A;
  --green:#0B4A30; --green-bg:#E1EEE5; --amber:#A97600; --amber-bg:#F5E9D2;
  --brick:#B1493C; --brick-bg:#F5E4E1; --gold-bg:#FBF0D6;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--ink-950);font-family:'Inter',sans-serif;color:var(--paper);}
h1,h2,h3{font-family:'Fraunces',serif;font-weight:500;margin:0;}
::selection{background:var(--gold);color:var(--ink-950);}
#app{max-width:780px;margin:0 auto;padding:0 20px 80px;}

.brand-row{display:flex;align-items:center;gap:12px;padding-top:28px;}
.brand-mark{flex:none;}
.brand-word{font-family:'Fraunces',serif;font-weight:600;font-size:19px;letter-spacing:0.02em;color:var(--paper);line-height:1.1;}
.brand-tagline{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.05em;color:var(--gold);text-transform:uppercase;}

.hero{padding:20px 0 32px;border-bottom:1px solid var(--ink-line);}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
.hero h1{font-size:32px;line-height:1.15;color:var(--paper);max-width:560px;}
.hero p{font-size:15px;color:var(--slate-light);max-width:560px;margin-top:14px;line-height:1.6;}
.weight-ledger{display:flex;gap:0;margin-top:26px;border:1px solid var(--ink-line);border-radius:10px;overflow:hidden;}
.weight-seg{padding:12px 16px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--paper);}
.weight-seg.atasan{background:var(--ink-800);flex:0 0 50%;border-right:1px solid var(--ink-line);}
.weight-seg.rekan{background:var(--ink-900);flex:1;}
.weight-seg b{display:block;font-family:'Fraunces',serif;font-size:20px;font-weight:500;color:var(--gold);margin-bottom:2px;}

.card{background:var(--paper);color:var(--ink-950);border-radius:14px;padding:26px 28px;margin-top:22px;}
.card + .card{margin-top:16px;}
.card h2{font-size:19px;color:var(--ink-950);}
.card .hint{font-size:13px;color:var(--slate);margin-top:6px;line-height:1.55;}

.field label{display:block;font-size:12px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:0.08em;color:var(--slate);margin:18px 0 8px;}
.field-row{display:flex;gap:14px;flex-wrap:wrap;}
.field-row .field{flex:1;min-width:180px;}
input[type=text],textarea,select{width:100%;border:1px solid var(--paper-line);background:#fff;border-radius:8px;padding:11px 13px;font-family:'Inter',sans-serif;font-size:14.5px;color:var(--ink-950);}
textarea{min-height:84px;resize:vertical;line-height:1.5;}
input[type=text]:focus,textarea:focus,select:focus{outline:2px solid var(--gold-dark);outline-offset:1px;}

.btn{font-family:'Inter',sans-serif;font-weight:500;font-size:14px;border-radius:8px;border:1px solid transparent;padding:12px 20px;cursor:pointer;transition:transform .08s ease;}
.btn:active{transform:scale(0.98);}
.btn-primary{background:var(--ink-950);color:var(--paper);}
.btn-primary:hover{background:var(--ink-800);}
.btn-ghost{background:transparent;color:var(--ink-950);border-color:var(--paper-line);}
.btn-ghost:hover{background:var(--paper-dim);}
.btn-gold{background:var(--gold);color:var(--ink-950);}
.btn-gold:hover{background:var(--gold-dark);color:#fff;}
.btn-sm{padding:8px 14px;font-size:12.5px;}
.btn-row{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap;}

.entry-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:22px;}
.access-note{text-align:center;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.03em;color:var(--slate-light);margin-top:16px;}
.entry-card{border:1px solid var(--paper-line);border-radius:12px;padding:20px 18px;background:#fff;cursor:pointer;text-align:left;font-family:'Inter',sans-serif;}
.entry-card:hover{border-color:var(--gold-dark);}
.entry-card .ec-title{font-family:'Fraunces',serif;font-size:17px;font-weight:500;color:var(--ink-950);margin-bottom:6px;}
.entry-card .ec-sub{font-size:12.5px;color:var(--slate);line-height:1.5;}

.section-label{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--slate);margin:24px 0 10px;}
.section-label:first-child{margin-top:4px;}
.role-grid{display:grid;grid-template-columns:1fr;gap:10px;}
.role-card{display:flex;align-items:center;justify-content:space-between;gap:14px;border:1px solid var(--paper-line);border-radius:12px;padding:16px 18px;background:#fff;cursor:pointer;text-align:left;width:100%;font-family:'Inter',sans-serif;}
.role-card:hover{border-color:var(--gold-dark);}
.role-card .rc-left{display:flex;flex-direction:column;gap:4px;}
.role-card .rc-title{font-family:'Fraunces',serif;font-size:16px;font-weight:500;color:var(--ink-950);}
.role-card .rc-sub{font-size:12px;color:var(--slate);font-family:'IBM Plex Mono',monospace;}
.status-pill{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:5px 10px;border-radius:20px;white-space:nowrap;}
.status-empty{background:var(--paper-dim);color:var(--slate);}
.status-partial{background:var(--amber-bg);color:var(--amber);}
.status-done{background:var(--green-bg);color:var(--green);}

.assign-row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;padding:16px 0;border-bottom:1px solid var(--paper-line);}
.assign-row:last-of-type{border-bottom:none;}
.assign-row .role-tag{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gold-dark);width:100%;text-transform:uppercase;letter-spacing:0.06em;}

.dim-block{margin-top:28px;}
.dim-block:first-child{margin-top:6px;}
.dim-head{display:flex;align-items:baseline;gap:10px;border-bottom:1px solid var(--paper-line);padding-bottom:8px;margin-bottom:14px;}
.dim-num{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--gold-dark);}
.dim-head h3{font-size:16px;}
.item-row{padding:14px 0;border-bottom:1px solid var(--paper-line);}
.item-row:last-child{border-bottom:none;}
.item-text{font-size:14.5px;line-height:1.5;margin-bottom:12px;color:var(--ink-950);}
.item-code{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--gold-dark);background:var(--paper-dim);border-radius:4px;padding:2px 6px;margin-right:8px;vertical-align:middle;}
.scale{display:flex;gap:6px;flex-wrap:wrap;}
.scale input{position:absolute;opacity:0;pointer-events:none;}
.scale label{flex:1 1 auto;min-width:38px;text-align:center;padding:9px 6px;border-radius:7px;border:1px solid var(--paper-line);font-family:'IBM Plex Mono',monospace;font-size:13px;cursor:pointer;color:var(--slate);background:#fff;}
.scale label.na-label{flex:1 1 100%;min-width:100%;margin-top:6px;font-family:'Inter',sans-serif;font-size:12.5px;text-align:left;padding:8px 12px;}
.scale input:checked + label{background:var(--ink-950);border-color:var(--ink-950);color:var(--paper);}
.scale input:checked + label.na-label{background:var(--paper-dim);border-color:var(--slate-light);color:var(--slate);}
.scale-legend{display:flex;justify-content:space-between;font-size:10.5px;color:var(--slate-light);margin-top:5px;font-family:'IBM Plex Mono',monospace;}
.scale-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.scale-end{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--slate);white-space:nowrap;}
.scale-end-right{margin-left:auto;}
.scale4{display:flex;gap:8px;}
.scale4 input{position:absolute;opacity:0;pointer-events:none;}
.scale4 label{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;border:1px solid var(--paper-line);font-family:'IBM Plex Mono',monospace;font-size:13px;cursor:pointer;color:var(--slate);background:#fff;}
.scale4 input:checked + label{background:var(--ink-950);border-color:var(--ink-950);color:var(--paper);}

.open-q{margin-top:10px;}
.open-q label{display:block;font-size:14px;font-weight:500;color:var(--ink-950);margin:20px 0 8px;}

.gauge-wrap{display:flex;flex-direction:column;align-items:center;padding:10px 0 6px;}
.gauge-score{font-family:'Fraunces',serif;font-size:44px;color:var(--ink-950);margin-top:-40px;}
.gauge-cat{font-family:'IBM Plex Mono',monospace;font-size:12.5px;padding:6px 14px;border-radius:20px;margin-top:6px;}
.cat-gold{background:var(--gold-bg);color:var(--gold-dark);}
.cat-green{background:var(--green-bg);color:var(--green);}
.cat-amber{background:var(--amber-bg);color:var(--amber);}
.cat-brick{background:var(--brick-bg);color:var(--brick);}

.contrib-bar{display:flex;height:34px;border-radius:8px;overflow:hidden;margin-top:18px;border:1px solid var(--paper-line);}
.contrib-seg{display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#fff;}
.contrib-atasan{background:var(--ink-950);}
.contrib-rekan{background:var(--slate);}

table.dim-table{width:100%;border-collapse:collapse;margin-top:14px;font-size:13.5px;}
table.dim-table td{padding:9px 0;border-bottom:1px solid var(--paper-line);color:var(--ink-950);}
table.dim-table td.score-cell{font-family:'IBM Plex Mono',monospace;text-align:right;}
.bar-track{background:var(--paper-dim);border-radius:5px;height:7px;width:100%;margin-top:5px;overflow:hidden;}
.bar-fill{height:100%;background:var(--ink-950);border-radius:5px;}

.open-answer{margin-top:14px;padding:14px 16px;background:var(--paper-dim);border-radius:9px;}
.open-answer .oa-q{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--slate);margin-bottom:5px;}
.open-answer .oa-a{font-size:14px;line-height:1.55;color:var(--ink-950);}
.rater-tag{display:inline-block;font-size:10.5px;font-family:'IBM Plex Mono',monospace;background:#fff;border:1px solid var(--paper-line);border-radius:20px;padding:2px 9px;margin-right:6px;color:var(--slate);}

.missing-note{background:var(--amber-bg);color:#6b4d0f;border-radius:9px;padding:14px 16px;font-size:13.5px;line-height:1.5;margin-top:20px;}
.info-note{background:var(--paper-dim);color:var(--slate);border-radius:9px;padding:12px 16px;font-size:13px;line-height:1.5;margin-top:16px;}
.empty-note{color:var(--slate);font-size:13.5px;padding:14px 0;}
.success-note{background:var(--green-bg);color:var(--green);border-radius:9px;padding:12px 16px;font-size:13px;line-height:1.5;margin-top:16px;}

.back-link{display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--slate-light);cursor:pointer;margin-bottom:18px;background:none;border:none;padding:0;}
.back-link:hover{color:var(--paper);}

.search-results{margin-top:14px;max-height:420px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;}
.search-hint{font-size:12px;color:var(--slate);margin-top:8px;}
.progress-track{background:var(--paper-dim);border-radius:6px;height:8px;width:100%;margin-top:10px;overflow:hidden;}
.progress-fill{height:100%;background:var(--ink-950);border-radius:6px;transition:width .15s ease;}
.progress-label{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--slate);margin-top:6px;}

@media(max-width:480px){ .hero h1{font-size:25px;} .card{padding:20px 18px;} .entry-grid{grid-template-columns:1fr;} }
</style>

/* ---------- STORAGE (Vercel KV via /api/kv) ---------- */
function rosterKey(){ return `${P}:roster`; }
function atasanSubKey(nik){ return `${P}:${nik}:sub:atasan`; }
function rekanSubKey(nik, raterNik){ return `${P}:${nik}:sub:rekan:${raterNik}`; }
function bawahanSubKey(nik, raterNik){ return `${P}:${nik}:sub:bawahan:${raterNik}`; }

let STORAGE_OK = true;

async function storeGet(key){
  try{
    const res = await fetch(`/api/kv?key=${encodeURIComponent(key)}`);
    if(!res.ok) return null;
    const data = await res.json();
    return data.value !== undefined ? data.value : null;
  }catch(e){ return null; }
}
async function storeSet(key, val){
  try{
    const res = await fetch('/api/kv', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ key, value: val }) });
    return res.ok;
  }catch(e){ return false; }
}
async function storeDelete(key){
  try{ await fetch(`/api/kv?key=${encodeURIComponent(key)}`, { method:'DELETE' }); }catch(e){}
}
async function checkStorageHealth(){
  try{
    const ok1 = await storeSet('__healthcheck__', '1');
    if(!ok1) return false;
    const v = await storeGet('__healthcheck__');
    return v === '1';
  }catch(e){ return false; }
}

async function getRoster(){
  let r = await storeGet(rosterKey());
  if(!r || r.length===0){
    r = SEED_ROSTER.slice();
    await storeSet(rosterKey(), r);
  }
  return r;
}
async function saveRoster(arr){ await storeSet(rosterKey(), arr); }
function findInRoster(roster, nik){ return roster.find(r=>r.nik===nik) || null; }
function upsertRoster(roster, record){ const i=roster.findIndex(r=>r.nik===record.nik); if(i>=0) roster[i]=record; else roster.push(record); }

async function subKeyForRole(pesertaNik, role, raterNik){
  if(role==='atasan') return atasanSubKey(pesertaNik);
  if(role==='bawahan') return bawahanSubKey(pesertaNik, raterNik);
  return rekanSubKey(pesertaNik, raterNik);
}

function findAssignmentsForRater(raterNik, roster){
  const out = [];
  for(const rec of roster){
    if(rec.atasan && rec.atasan.nik===raterNik) out.push({pesertaNik:rec.nik, pesertaNama:rec.nama, role:'atasan', raterNama:rec.atasan.nama});
    (rec.rekan||[]).forEach(p=>{ if(p.nik===raterNik) out.push({pesertaNik:rec.nik, pesertaNama:rec.nama, role:'rekan', raterNama:p.nama}); });
    (rec.bawahan||[]).forEach(p=>{ if(p.nik===raterNik) out.push({pesertaNik:rec.nik, pesertaNama:rec.nama, role:'bawahan', raterNama:p.nama}); });
  }
  return out;
}

  const views = { home:renderHome, raterLogin:renderRaterLogin, raterInbox:renderRaterInboxShell,
    adminAuth:renderAdminAuth, adminHub:renderAdminHubShell, adminPanel:renderAdminPanelShell, form:renderFormShell, results:renderResultsShell };
  root.appendChild(views[STATE.view]());
}

/* ---------- HOME ---------- */
function renderHome(){
  const wrap = el(`<div>
    ${renderHero('<b style="color:var(--paper)">Masuk sesuai peran Anda.</b> Penilai akan melihat daftar tugas penilaiannya.')}
    <div class="entry-grid">
      <button class="entry-card" id="go-rater">
        <div class="ec-title">Saya penilai</div>
        <div class="ec-sub">Masuk dengan NIK Anda sendiri sebagai atasan, rekan kerja, atau bawahan. Daftar orang yang perlu Anda nilai akan langsung muncul.</div>
      </button>
      <button class="entry-card" id="go-admin">
        <div class="ec-title">Saya admin / HR</div>
        <div class="ec-sub">Import data penugasan, ubah atasan/peers/bawahan langsung, pantau status, dan ekspor hasil.</div>
      </button>
    </div>
    <div class="access-note">Hanya untuk internal Karyawan PT Pegadaian (Persero) Kantor Wilayah XI Semarang</div>
  </div>`);
  wrap.querySelector('#go-rater').addEventListener('click', ()=>{ STATE.view='raterLogin'; render(); });
  wrap.querySelector('#go-admin').addEventListener('click', ()=>{ STATE.view='adminAuth'; render(); });
  return wrap;
}

/* ---------- ADMIN AUTH ---------- */
function renderAdminAuth(){
  const wrap = el(`<div>
    <button class="back-link" id="back-home">&larr; kembali</button>
    ${renderHero('Halaman admin dilindungi kata sandi. Hubungi pemegang akses admin/HR jika Anda belum memilikinya.', {noBrand:true})}
    <div class="card">
      <h2>Masuk sebagai admin</h2>
      <div class="field"><label>Kata sandi admin</label><input type="text" id="admin-pw" placeholder="Masukkan kata sandi"></div>
      <div class="btn-row"><button class="btn btn-primary" id="admin-pw-go">Masuk</button></div>
      <div id="admin-pw-msg"></div>
    </div>
  </div>`);
  wrap.querySelector('#back-home').addEventListener('click', ()=>{ STATE.view='home'; render(); });
  const tryLogin = ()=>{
    const pw = wrap.querySelector('#admin-pw').value;
    if(pw === ADMIN_PASSWORD){ STATE.view='adminHub'; render(); }
    else { wrap.querySelector('#admin-pw-msg').innerHTML = `<div class="missing-note">Kata sandi salah. Coba lagi.</div>`; }
  };
  wrap.querySelector('#admin-pw-go').addEventListener('click', tryLogin);
  wrap.querySelector('#admin-pw').addEventListener('keydown', e=>{ if(e.key==='Enter') tryLogin(); });
  return wrap;
}

/* ---------- RATER LOGIN ---------- */
function renderRaterLogin(){
  const wrap = el(`<div>
    <button class="back-link" id="back-home">&larr; kembali</button>
    ${renderHero('Masukkan NIK Anda. Sistem akan mencocokkan dengan data penugasan yang sudah diimpor admin/HR.')}
    <div class="card">
      <h2>Masuk sebagai penilai</h2>
      <div class="field"><label>NIK Anda</label><input type="text" id="my-nik" placeholder="mis. P9xxxx"></div>
      <div class="btn-row"><button class="btn btn-primary" id="lookup-btn">Lanjutkan</button></div>
      <div id="lookup-msg"></div>
    </div>
  </div>`);
  wrap.querySelector('#back-home').addEventListener('click', ()=>{ STATE.view='home'; render(); });
  const doLookup = async ()=>{
    const nik = wrap.querySelector('#my-nik').value.trim();
    if(!nik) return;
    const roster = await getRoster();
    const idx = findAssignmentsForRater(nik, roster);
    if(idx.length===0){
      wrap.querySelector('#lookup-msg').innerHTML = `<div class="missing-note">Belum ada penugasan penilaian untuk NIK ${escapeHtml(nik)}. Hubungi admin/HR untuk dipastikan datanya sudah diimpor.</div>`;
      return;
    }
    STATE.raterNik = nik;
    STATE.raterNama = idx[0].raterNama;
    STATE.view='raterInbox'; render();
  };
  wrap.querySelector('#lookup-btn').addEventListener('click', doLookup);
  wrap.querySelector('#my-nik').addEventListener('keydown', e=>{ if(e.key==='Enter') doLookup(); });
  return wrap;
}

function renderRaterInboxShell(){
  const wrap = el(`<div><div id="inbox-mount"></div></div>`);
  mountRaterInbox(wrap.querySelector('#inbox-mount'));
  return wrap;
}

async function mountRaterInbox(mount){
  const roster = await getRoster();
  const idx = findAssignmentsForRater(STATE.raterNik, roster);
  let rowsHtml = '';
  if(idx.length===0) rowsHtml = `<div class="empty-note">Belum ada penugasan penilaian untuk Anda.</div>`;
  const node = el(`<div>
    <button class="back-link" id="back-login">&larr; keluar</button>
    ${renderHero(`Selamat datang, <b style="color:var(--paper)">${escapeHtml(STATE.raterNama)}</b> &middot; NIK ${escapeHtml(STATE.raterNik)}`, {noBrand:true})}
    <div class="card">
      <h2>Penilaian yang perlu Anda isi</h2>
      <div class="hint">Klik salah satu untuk mulai atau melanjutkan pengisian.</div>
      <div class="role-grid" id="inbox-grid">${rowsHtml}</div>
    </div>
  </div>`);
  node.querySelector('#back-login').addEventListener('click', ()=>{ STATE.view='home'; render(); });
  mount.innerHTML=''; mount.appendChild(node);

  const grid = node.querySelector('#inbox-grid');
  for(const entry of idx){
    const dims = dimsForKind(kindForRole(entry.role));
    const total = dims.reduce((s,d)=>s+d.items.length,0);
    const subKey = await subKeyForRole(entry.pesertaNik, entry.role, STATE.raterNik);
    const sub = await storeGet(subKey);
    const answered = sub ? Object.keys(sub.itemScores||{}).length : 0;
    let statusClass='status-empty', statusText='Belum diisi';
    if(sub && sub.submitted){ statusClass='status-done'; statusText='Terisi lengkap'; }
    else if(answered>0){ statusClass='status-partial'; statusText=`${answered}/${total} terisi`; }
    const card = el(`<button class="role-card">
      <div class="rc-left"><div class="rc-title">${escapeHtml(entry.pesertaNama)}</div><div class="rc-sub">Peran Anda: ${ROLE_LABEL[entry.role]}</div></div>
      <div class="status-pill ${statusClass}">${statusText}</div>
    </button>`);
    card.addEventListener('click', ()=>{
      STATE.pesertaNik = entry.pesertaNik; STATE.pesertaNama = entry.pesertaNama;
      STATE.role = entry.role; STATE.mode='rater';
      STATE.view='form'; render();
    });
    grid.appendChild(card);
  }
}

/* ---------- IMPORT PARSER ---------- */
function parseWorkbookToRecords(wb){
  let sheetName = wb.SheetNames.find(n=>/multirater/i.test(n)) || wb.SheetNames.find(n=>/olah/i.test(n)) || wb.SheetNames[0];
  const sheet = wb.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(sheet, {header:1, raw:false, defval:''});
  let headerRowIdx = rows.findIndex(r=>r.some(c=>String(c).trim().toUpperCase()==='NIK'));
  if(headerRowIdx<0) headerRowIdx = 0;
  const headers = rows[headerRowIdx].map(h=>String(h).trim().toUpperCase());
  const dataRows = rows.slice(headerRowIdx+1).filter(r=>r.some(c=>String(c).trim()!==''));

  const nikColIdx = headers.indexOf('NIK');
  const namaColIdx = headers.indexOf('NAMA');
  const jabatanColIdx = (()=>{ const i = headers.indexOf('JABATAN'); return i>=0?i:headers.indexOf('JOB NAME'); })();
  const unitColIdx = (()=>{ for(const cand of ['CABANG','KANTOR CABANG','UNIT ADVANCE','NAMA UNIT KERJA']){ const i=headers.indexOf(cand); if(i>=0) return i; } return -1; })();

  const records = [];
  let skipped = 0;
  const hasManagerCols = headers.includes('NIK MANAGER');

  if(hasManagerCols){
    const nikManagerIdx = headers.indexOf('NIK MANAGER');
    const namaManagerIdx = headers.indexOf('NAMA MANAGER');
    const peerNikIdxs = headers.map((h,i)=>({h,i})).filter(x=>/^NIK PEER/.test(x.h)).map(x=>x.i);
    const peerNamaIdxs = headers.map((h,i)=>({h,i})).filter(x=>/^NAMA PEER/.test(x.h)).map(x=>x.i);
    const teamNikIdxs = headers.map((h,i)=>({h,i})).filter(x=>/^NIK TEAM/.test(x.h)).map(x=>x.i);
    const teamNamaIdxs = headers.map((h,i)=>({h,i})).filter(x=>/^NAMA TEAM/.test(x.h)).map(x=>x.i);
    for(const row of dataRows){
      const nik = String(row[nikColIdx]||'').trim();
      if(!nik){ skipped++; continue; }
      const nama = String(row[namaColIdx]||'').trim();
      const atasanNik = String(row[nikManagerIdx]||'').trim();
      const atasan = atasanNik ? { nik:atasanNik, nama:String(row[namaManagerIdx]||'').trim() } : null;
      const rekan = peerNikIdxs.map((idx,k)=>{ const v=String(row[idx]||'').trim(); if(!v) return null; return {nik:v, nama:String(row[peerNamaIdxs[k]]||'').trim()}; }).filter(Boolean);
      const bawahan = teamNikIdxs.map((idx,k)=>{ const v=String(row[idx]||'').trim(); if(!v) return null; return {nik:v, nama:String(row[teamNamaIdxs[k]]||'').trim()}; }).filter(Boolean);
      records.push({ nik, nama, jabatan: jabatanColIdx>=0?String(row[jabatanColIdx]||'').trim():'', unit: unitColIdx>=0?String(row[unitColIdx]||'').trim():'', atasan, rekan, bawahan });
    }
  } else {
    const atasanIdx = headers.indexOf('ATASAN');
    const peerIdxs = headers.map((h,i)=>({h,i})).filter(x=>x.h==='PEERS').map(x=>x.i);
    const teamIdxs = headers.map((h,i)=>({h,i})).filter(x=>x.h==='TEAM').map(x=>x.i);
    const nikToNama = {};
    dataRows.forEach(row=>{ const n=String(row[nikColIdx]||'').trim(); if(n) nikToNama[n]=String(row[namaColIdx]||'').trim(); });
    for(const row of dataRows){
      const nik = String(row[nikColIdx]||'').trim();
      if(!nik){ skipped++; continue; }
      const nama = String(row[namaColIdx]||'').trim();
      const atasanNik = atasanIdx>=0 ? String(row[atasanIdx]||'').trim() : '';
      const atasan = atasanNik ? { nik:atasanNik, nama: nikToNama[atasanNik] || '' } : null;
      const rekan = peerIdxs.map(idx=>{ const v=String(row[idx]||'').trim(); if(!v) return null; return {nik:v, nama:nikToNama[v]||''}; }).filter(Boolean);
      const bawahan = teamIdxs.map(idx=>{ const v=String(row[idx]||'').trim(); if(!v) return null; return {nik:v, nama:nikToNama[v]||''}; }).filter(Boolean);
      records.push({ nik, nama, jabatan: jabatanColIdx>=0?String(row[jabatanColIdx]||'').trim():'', unit: unitColIdx>=0?String(row[unitColIdx]||'').trim():'', atasan, rekan, bawahan });
    }
  }
  return { records, skipped, sheetName };
}

/* ---------- EXPORT ---------- */
function exportRosterXlsx(roster){
  const maxRekan = Math.max(0, ...roster.map(r=>(r.rekan||[]).length));
  const maxBawahan = Math.max(0, ...roster.map(r=>(r.bawahan||[]).length));
  const header = ['NIK','NAMA','JABATAN','UNIT','NIK ATASAN','NAMA ATASAN'];
  for(let i=1;i<=maxRekan;i++) header.push(`NIK REKAN ${i}`, `NAMA REKAN ${i}`);
  for(let i=1;i<=maxBawahan;i++) header.push(`NIK BAWAHAN ${i}`, `NAMA BAWAHAN ${i}`);
  const rows = [header];
  roster.forEach(r=>{
    const row = [r.nik, r.nama, r.jabatan||'', r.unit||'', r.atasan?r.atasan.nik:'', r.atasan?r.atasan.nama:''];
    for(let i=0;i<maxRekan;i++){ const p=(r.rekan||[])[i]; row.push(p?p.nik:'', p?p.nama:''); }
    for(let i=0;i<maxBawahan;i++){ const p=(r.bawahan||[])[i]; row.push(p?p.nik:'', p?p.nama:''); }
    rows.push(row);
  });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Penugasan');
  XLSX.writeFile(wb, 'pegadaian-360-penugasan.xlsx');
}

async function computeResultsForRecord(record){
  const atasan = record.atasan ? await storeGet(atasanSubKey(record.nik)) : null;
  const rekanSubsAll = [];
  for(const ref of (record.rekan||[])){ const s = await storeGet(rekanSubKey(record.nik, ref.nik)); if(s) rekanSubsAll.push(s); }
  const bawahanSubsAll = [];
  for(const ref of (record.bawahan||[])){ const s = await storeGet(bawahanSubKey(record.nik, ref.nik)); if(s) bawahanSubsAll.push(s); }
  const allRekan = rekanSubsAll.filter(r=>r.submitted);
  const allBawahan = bawahanSubsAll.filter(r=>r.submitted);
  const atasanOk = atasan && atasan.submitted;
  if(!atasanOk && allRekan.length===0 && allBawahan.length===0) return null;

  const atasanScore = atasanOk ? to100(overallAverage(ATASAN_DIMENSIONS, atasan.itemScores)) : null;
  const rekanAvgs = allRekan.map(r=>overallAverage(REKAN_DIMENSIONS, r.itemScores)).filter(v=>v!=null);
  const rekanScore = rekanAvgs.length ? to100(rekanAvgs.reduce((a,b)=>a+b,0)/rekanAvgs.length) : null;
  const bawahanAvgs = allBawahan.map(r=>overallAverage(BAWAHAN_DIMENSIONS, r.itemScores)).filter(v=>v!=null);
  const bawahanScore = bawahanAvgs.length ? to100(bawahanAvgs.reduce((a,b)=>a+b,0)/bawahanAvgs.length) : null;

  const active = [];
  if(atasanScore!=null) active.push({key:'atasan', score:atasanScore, weight:WEIGHTS.atasan});
  if(rekanScore!=null) active.push({key:'rekan', score:rekanScore, weight:WEIGHTS.rekan});
  if(bawahanScore!=null) active.push({key:'bawahan', score:bawahanScore, weight:WEIGHTS.bawahan});
  let finalScore=null, category=null;
  if(active.length>=2 && atasanScore!=null){
    const totalWeight = active.reduce((s,g)=>s+g.weight,0);
    finalScore = Math.round((active.reduce((s,g)=>s+g.score*g.weight,0)/totalWeight)*10)/10;
    category = getCategory(finalScore).label;
  }
  return { atasan, allRekan, allBawahan, atasanScore, rekanScore, bawahanScore, finalScore, category };
}

async function exportResultsXlsx(progressEl){
  progressEl.innerHTML = `<div class="progress-label">Memuat data peserta...</div>`;
  const roster = await getRoster();
  const summary = [['NIK','NAMA','JABATAN','UNIT','STATUS','SKOR ATASAN','SKOR REKAN KERJA','SKOR BAWAHAN','SKOR AKHIR','KATEGORI']];
  const openRows = [['NIK PESERTA','NAMA PESERTA','NAMA RATER','PERAN','PERTANYAAN','JAWABAN']];
  let done=0;
  const CHUNK = 20;
  for(let i=0;i<roster.length;i+=CHUNK){
    const batch = roster.slice(i, i+CHUNK);
    const results = await Promise.all(batch.map(rec=>computeResultsForRecord(rec)));
    batch.forEach((rec, k)=>{
      const res = results[k];
      if(res){
        const status = res.finalScore!=null ? 'Lengkap' : 'Sebagian';
        summary.push([rec.nik, rec.nama, rec.jabatan||'', rec.unit||'', status,
          res.atasanScore??'', res.rekanScore??'', res.bawahanScore??'', res.finalScore??'', res.category||'']);
        if(res.atasan) ATASAN_OPEN.forEach(q=>openRows.push([rec.nik, rec.nama, res.atasan.raterNama||'', 'Atasan', q.label, res.atasan.open[q.id]||'']));
        res.allRekan.forEach(r=>REKAN_OPEN.forEach(q=>openRows.push([rec.nik, rec.nama, r.raterNama||'', 'Rekan Kerja', q.label, r.open[q.id]||''])));
        res.allBawahan.forEach(r=>BAWAHAN_OPEN.forEach(q=>openRows.push([rec.nik, rec.nama, r.raterNama||'', 'Bawahan', q.label, r.open[q.id]||''])));
      }
    });
    done += batch.length;
    progressEl.innerHTML = `<div class="progress-track"><div class="progress-fill" style="width:${Math.round(done/roster.length*100)}%"></div></div><div class="progress-label">Memproses ${done}/${roster.length} peserta...</div>`;
  }
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summary), 'Ringkasan Skor');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(openRows), 'Jawaban Terbuka');
  XLSX.writeFile(wb, 'pegadaian-360-hasil.xlsx');
  progressEl.innerHTML = `<div class="success-note">Ekspor selesai. ${summary.length-1} peserta memiliki data penilaian.</div>`;
}

    <div class="card">
      <h2>Hasil gabungan</h2>
      <div class="hint">Skor akhir dihitung dari kelompok penilai yang sudah mengisi (minimal Atasan, ditambah minimal satu kelompok lain).</div>
      <div class="btn-row">
        <button class="btn btn-gold" id="view-results">Lihat hasil &amp; rekomendasi</button>
        <button class="btn btn-ghost" id="reset-data">Hapus peserta ini dari data</button>
      </div>
    </div>
  </div>`);

  node.querySelector('#back-hub').addEventListener('click', ()=>{ STATE.view='adminHub'; render(); });
  node.querySelector('#view-results').addEventListener('click', ()=>{ STATE.view='results'; render(); });

  const rekanContainer = node.querySelector('#rekan-rows');
  node.querySelector('#add-rekan-row').addEventListener('click', ()=>{ rekanContainer.appendChild(el(dynamicRowHtml('assign-row-rekan','','','rekan kerja'))); });
  rekanContainer.addEventListener('click', e=>{ if(e.target.classList.contains('remove-dyn-row')) e.target.closest('.assign-row-rekan').remove(); });

  const bawahanContainer = node.querySelector('#bawahan-rows');
  node.querySelector('#add-bawahan-row').addEventListener('click', ()=>{ bawahanContainer.appendChild(el(dynamicRowHtml('assign-row-bawahan','','','bawahan'))); });
  bawahanContainer.addEventListener('click', e=>{ if(e.target.classList.contains('remove-dyn-row')) e.target.closest('.assign-row-bawahan').remove(); });

  node.querySelector('#reset-data').addEventListener('click', async ()=>{
    if(!confirm(`Hapus "${record.nama}" (NIK ${record.nik}) beserta semua penilaiannya dari data? Tindakan ini tidak dapat dibatalkan.`)) return;
    const cur = await getRoster();
    const idx = cur.findIndex(r=>r.nik===record.nik);
    if(idx>=0) cur.splice(idx,1);
    await saveRoster(cur);
    await storeDelete(atasanSubKey(record.nik));
    for(const p of (record.rekan||[])) await storeDelete(rekanSubKey(record.nik, p.nik));
    for(const p of (record.bawahan||[])) await storeDelete(bawahanSubKey(record.nik, p.nik));
    STATE.view='adminHub'; render();
  });

  node.querySelector('#save-assign').addEventListener('click', async ()=>{
    const atasanNik = node.querySelector('#atasan-nik').value.trim();
    const atasanNama = node.querySelector('#atasan-nama').value.trim();
    const newAtasan = (atasanNik && atasanNama) ? {nik:atasanNik, nama:atasanNama} : null;
    const oldAtasanNik = record.atasan ? record.atasan.nik : null;
    if(oldAtasanNik && oldAtasanNik !== (newAtasan?newAtasan.nik:null)){
      await storeDelete(atasanSubKey(record.nik));
    }
    const newRekan = [];
    node.querySelectorAll('.assign-row-rekan').forEach(row=>{
      const nik = row.querySelector('.dyn-nik').value.trim();
      const nama = row.querySelector('.dyn-nama').value.trim();
      if(nik && nama) newRekan.push({nik, nama});
    });
    const newBawahan = [];
    node.querySelectorAll('.assign-row-bawahan').forEach(row=>{
      const nik = row.querySelector('.dyn-nik').value.trim();
      const nama = row.querySelector('.dyn-nama').value.trim();
      if(nik && nama) newBawahan.push({nik, nama});
    });
    const newRecord = { nik:record.nik, nama:record.nama, jabatan:record.jabatan||'', unit:record.unit||'', atasan:newAtasan, rekan:newRekan, bawahan:newBawahan };
    const cur = await getRoster();
    upsertRoster(cur, newRecord);
    await saveRoster(cur);
    record = newRecord;
    mountAdminPanel(mount);
  });

  mount.innerHTML=''; mount.appendChild(node);
  populateStatusGrid(node.querySelector('#status-grid'), record);
}

async function populateStatusGrid(container, record){
  container.innerHTML='';
  if(record.atasan){
    const sub = await storeGet(atasanSubKey(record.nik));
    container.appendChild(statusCard(record.atasan, 'Atasan', sub, ATASAN_DIMENSIONS));
  } else {
    container.appendChild(el(`<div class="empty-note">Atasan: belum ditugaskan.</div>`));
  }
  const rekanList = record.rekan || [];
  if(rekanList.length===0) container.appendChild(el(`<div class="empty-note">Rekan Kerja: belum ditugaskan.</div>`));
  for(const p of rekanList){
    const sub = await storeGet(rekanSubKey(record.nik, p.nik));
    container.appendChild(statusCard(p, 'Rekan Kerja', sub, REKAN_DIMENSIONS));
  }
  const bawahanList = record.bawahan || [];
  if(bawahanList.length===0) container.appendChild(el(`<div class="empty-note">Bawahan: belum ditugaskan.</div>`));
  for(const p of bawahanList){
    const sub = await storeGet(bawahanSubKey(record.nik, p.nik));
    container.appendChild(statusCard(p, 'Bawahan', sub, BAWAHAN_DIMENSIONS));
  }
}
function statusCard(info, label, sub, dims){
  const total = dims.reduce((s,d)=>s+d.items.length,0);
  const answered = sub ? Object.keys(sub.itemScores||{}).length : 0;
  let statusClass='status-empty', statusText='Belum diisi';
  if(sub && sub.submitted){ statusClass='status-done'; statusText='Terisi lengkap'; }
  else if(answered>0){ statusClass='status-partial'; statusText=`${answered}/${total} terisi`; }
  return el(`<div class="role-card" style="cursor:default;">
    <div class="rc-left"><div class="rc-title">${escapeHtml(info.nama)}</div><div class="rc-sub">${label} &middot; NIK ${escapeHtml(info.nik)}</div></div>
    <div class="status-pill ${statusClass}">${statusText}</div>
  </div>`);
}

/* ---------- FORM ---------- */
function renderFormShell(){
  const wrap = el(`<div><div id="form-mount"></div></div>`);
  mountForm(wrap.querySelector('#form-mount'));
  return wrap;
}

async function mountForm(mount){
  const role = STATE.role;
  const kind = kindForRole(role);
  const dims = dimsForKind(kind);
  const openQs = openForKind(kind);
  const raterNik = STATE.raterNik;
  const raterNama = STATE.raterNama;
  const key = await subKeyForRole(STATE.pesertaNik, role, raterNik);
  let existing = await storeGet(key) || { raterNik, raterNama, itemScores:{}, open:{}, submitted:false };

  let itemsHtml = '';
  dims.forEach((dim, di)=>{
    itemsHtml += `<div class="dim-block">`;
    if(dim.title){
      itemsHtml += `<div class="dim-head"><span class="dim-num">${String(di+1).padStart(2,'0')}</span><h3>${dim.title}</h3></div>`;
    }
    dim.items.forEach((item, ii)=>{
      const itemId = `${dim.key}_${ii}`;
      const cur = existing.itemScores[itemId];
      itemsHtml += `<div class="item-row">
        <div class="item-text">${ii+1}. ${item.text}</div>
        <div class="scale-row">
          <span class="scale-end">Jarang</span>
          <div class="scale4">
            ${[1,2,3,4].map(v=>`<input type="radio" name="${itemId}" id="${itemId}_${v}" value="${v}" ${cur==v?'checked':''}><label for="${itemId}_${v}">${v}</label>`).join('')}
          </div>
          <span class="scale-end scale-end-right">Konsisten</span>
        </div>
      </div>`;
    });
    itemsHtml += `</div>`;
  });

  let openHtml = '';
  if(openQs.length>0){
    openHtml = '<div class="dim-block"><div class="dim-head"><span class="dim-num">&#9998;</span><h3>Pertanyaan terbuka</h3></div><div class="open-q">';
    openQs.forEach(q=>{
      const cur = existing.open[q.id] || '';
      openHtml += `<label>${q.label}</label><textarea data-open="${q.id}" placeholder="Tulis jawaban di sini...">${escapeHtml(cur)}</textarea>`;
    });
    openHtml += '</div></div>';
  }

  const backView = STATE.mode==='rater' ? 'raterInbox' : 'adminPanel';
  const node = el(`<div>
    <button class="back-link" id="back-btn">&larr; kembali</button>
    ${renderHero(`Formulir ${ROLE_LABEL[role]} &middot; diisi oleh <b style="color:var(--paper)">${escapeHtml(raterNama||'')}</b> untuk <b style="color:var(--paper)">${escapeHtml(STATE.pesertaNama)}</b>`, {noBrand:true})}
    <div class="card">
      ${itemsHtml}
      ${openHtml}
      <div class="btn-row">
        <button class="btn btn-primary" id="submit-form">Simpan penilaian</button>
        <button class="btn btn-ghost" id="save-draft">Simpan sebagai draf</button>
      </div>
    </div>
  </div>`);

  node.querySelector('#back-btn').addEventListener('click', ()=>{ STATE.view=backView; render(); });
  node.querySelector('#save-draft').addEventListener('click', ()=>handleFormSave(node, kind, key, raterNik, raterNama, false, backView));
  node.querySelector('#submit-form').addEventListener('click', ()=>handleFormSave(node, kind, key, raterNik, raterNama, true, backView));

  mount.innerHTML=''; mount.appendChild(node);
}

async function handleFormSave(node, kind, key, raterNik, raterNama, isFinal, backView){
  const dims = dimsForKind(kind);
  const itemScores = {};
  let missing = 0;
  dims.forEach(dim=>{
    dim.items.forEach((item, ii)=>{
      const itemId = `${dim.key}_${ii}`;
      const checked = node.querySelector(`input[name="${itemId}"]:checked`);
      if(checked) itemScores[itemId] = checked.value; else missing++;
    });
  });
  const open = {};
  node.querySelectorAll('[data-open]').forEach(f=>{ open[f.dataset.open] = f.value.trim(); });
  if(isFinal && missing>0){
    alert(`Masih ada ${missing} pernyataan yang belum dijawab. Lengkapi seluruh pernyataan (atau pilih "Tidak memiliki informasi yang cukup untuk menilai") sebelum menyimpan penilaian final.`);
    return;
  }
  await storeSet(key, { raterNik, raterNama, itemScores, open, submitted: isFinal, updatedAt: Date.now() });
  STATE.view = backView; render();
}


/* ---------- SCORING & RESULTS ---------- */
function dimAverage(dim, itemScores){
  let sum=0,n=0;
  dim.items.forEach((t,ii)=>{ const v=itemScores[`${dim.key}_${ii}`]; if(v && v!=='na'){ sum+=Number(v); n++; } });
  return n>0 ? sum/n : null;
}
function overallAverage(dims, itemScores){
  let sum=0,n=0;
  dims.forEach(dim=>dim.items.forEach((t,ii)=>{ const v=itemScores[`${dim.key}_${ii}`]; if(v && v!=='na'){ sum+=Number(v); n++; } }));
  return n>0 ? sum/n : null;
}
function to100(avg){ return avg==null ? null : Math.round(((avg-1)/3)*100*10)/10; }
function getCategory(score){
  if(score>=90) return {label:'Sangat Siap (Highly Ready)', code:'gold'};
  if(score>=80) return {label:'Siap (Ready)', code:'green'};
  if(score>=70) return {label:'Cukup Siap (Developing)', code:'amber'};
  return {label:'Perlu Pengembangan (Need Development)', code:'brick'};
}

function renderResultsShell(){
  const wrap = el(`<div><div id="results-mount"><div class="hero">${renderHero('Menghitung hasil...', {noBrand:true})}</div></div></div>`);
  mountResults(wrap.querySelector('#results-mount'));
  return wrap;
}

async function mountResults(mount){
  const roster = await getRoster();
  const record = findInRoster(roster, STATE.pesertaNik) || { atasan:null, rekan:[], bawahan:[] };
  const atasan = record.atasan ? await storeGet(atasanSubKey(STATE.pesertaNik)) : null;
  const rekanRefs = record.rekan || [];
  const rekanSubsAll = [];
  for(const ref of rekanRefs){ const s = await storeGet(rekanSubKey(STATE.pesertaNik, ref.nik)); if(s) rekanSubsAll.push(s); }
  const allRekan = rekanSubsAll.filter(r=>r.submitted);

  const bawahanRefs = record.bawahan || [];
  const bawahanSubsAll = [];
  for(const ref of bawahanRefs){ const s = await storeGet(bawahanSubKey(STATE.pesertaNik, ref.nik)); if(s) bawahanSubsAll.push(s); }
  const allBawahan = bawahanSubsAll.filter(r=>r.submitted);

  const atasanOk = atasan && atasan.submitted;
  const rekanCount = allRekan.length;
  const bawahanCount = allBawahan.length;
  const groupsWithData = (rekanCount>0?1:0) + (bawahanCount>0?1:0);

  if(!atasanOk || groupsWithData===0){
    const need = [];
    if(!record.atasan) need.push('penugasan Atasan');
    else if(!atasanOk) need.push('pengisian penilaian Atasan');
    if(groupsWithData===0) need.push('minimal satu penilaian Rekan Kerja atau Bawahan yang sudah disimpan final');
    mount.innerHTML = `
      <button class="back-link" id="back-admin">&larr; kembali ke panel admin</button>
      ${renderHero(`Menilai: <b style="color:var(--paper)">${escapeHtml(STATE.pesertaNama)}</b> &middot; NIK ${escapeHtml(STATE.pesertaNik)}`, {noBrand:true})}
      <div class="card"><h2>Hasil belum lengkap</h2><div class="missing-note">Data yang masih dibutuhkan: ${need.join(' dan ')}.</div></div>`;
    mount.querySelector('#back-admin').addEventListener('click', ()=>{ STATE.view='adminPanel'; render(); });
    return;
  }

  const atasanScore = to100(overallAverage(ATASAN_DIMENSIONS, atasan.itemScores));
  const rekanAvgs = allRekan.map(r=>overallAverage(REKAN_DIMENSIONS, r.itemScores)).filter(v=>v!=null);
  const rekanScore = rekanAvgs.length ? to100(rekanAvgs.reduce((a,b)=>a+b,0)/rekanAvgs.length) : null;
  const bawahanAvgs = allBawahan.map(r=>overallAverage(BAWAHAN_DIMENSIONS, r.itemScores)).filter(v=>v!=null);
  const bawahanScore = bawahanAvgs.length ? to100(bawahanAvgs.reduce((a,b)=>a+b,0)/bawahanAvgs.length) : null;

  const active = [{ key:'atasan', label:'Atasan', score:atasanScore, weight:WEIGHTS.atasan }];
  if(rekanScore!=null) active.push({ key:'rekan', label:'Rekan Kerja', score:rekanScore, weight:WEIGHTS.rekan });
  if(bawahanScore!=null) active.push({ key:'bawahan', label:'Bawahan', score:bawahanScore, weight:WEIGHTS.bawahan });
  const totalWeight = active.reduce((s,g)=>s+g.weight,0);
  const finalScore = Math.round((active.reduce((s,g)=>s+g.score*g.weight,0)/totalWeight)*10)/10;
  const cat = getCategory(finalScore);

  const atasanDimRows = ATASAN_DIMENSIONS.map(dim=>({ title:dim.title, s100: to100(dimAverage(dim, atasan.itemScores)) }));
  const rekanDimRows = REKAN_DIMENSIONS.map(dim=>{
    let sum=0,n=0;
    allRekan.forEach(r=>dim.items.forEach((t,ii)=>{ const v=r.itemScores[`${dim.key}_${ii}`]; if(v && v!=='na'){ sum+=Number(v); n++; } }));
    return { title:dim.title, s100: to100(n>0?sum/n:null) };
  });
  const bawahanDimRows = BAWAHAN_DIMENSIONS.map(dim=>{
    let sum=0,n=0;
    allBawahan.forEach(r=>dim.items.forEach((t,ii)=>{ const v=r.itemScores[`${dim.key}_${ii}`]; if(v && v!=='na'){ sum+=Number(v); n++; } }));
    return { title:dim.title, s100: to100(n>0?sum/n:null) };
  });

  const gaugeSvg = buildGauge(finalScore);
  const openAtasanHtml = ATASAN_OPEN.map(q=>`<div class="open-answer"><div class="oa-q"><span class="rater-tag">${escapeHtml(atasan.raterNama)} &middot; Atasan</span>${q.label}</div><div class="oa-a">${escapeHtml(atasan.open[q.id]||'(tidak diisi)')}</div></div>`).join('');
  let openRekanHtml = '';
  allRekan.forEach(r=>REKAN_OPEN.forEach(q=>{
    openRekanHtml += `<div class="open-answer"><div class="oa-q"><span class="rater-tag">${escapeHtml(r.raterNama)} &middot; Rekan Kerja</span>${q.label}</div><div class="oa-a">${escapeHtml(r.open[q.id]||'(tidak diisi)')}</div></div>`;
  }));
  let openBawahanHtml = '';
  allBawahan.forEach(r=>BAWAHAN_OPEN.forEach(q=>{
    openBawahanHtml += `<div class="open-answer"><div class="oa-q"><span class="rater-tag">${escapeHtml(r.raterNama)} &middot; Bawahan</span>${q.label}</div><div class="oa-a">${escapeHtml(r.open[q.id]||'(tidak diisi)')}</div></div>`;
  }));

  const contribHtml = active.map(g=>{
    const pct = Math.round((g.weight/totalWeight)*100);
    const cls = g.key==='atasan' ? 'contrib-atasan' : 'contrib-rekan';
    const nameSuffix = g.key==='atasan' ? ` (${escapeHtml(atasan.raterNama)})` : g.key==='rekan' ? ` (${rekanCount} org)` : ` (${bawahanCount} org)`;
    return `<div class="contrib-seg ${cls}" style="flex:0 0 ${pct}%">${g.label}${nameSuffix} &middot; ${g.score}</div>`;
  }).join('');
  const skippedNote = (rekanScore==null || bawahanScore==null) ? `<div class="info-note">${rekanScore==null?'Belum ada penilaian Rekan Kerja final. ':''}${bawahanScore==null?'Belum ada penilaian Bawahan final. ':''}Bobot dihitung ulang hanya dari kelompok yang sudah mengisi.</div>` : '';

  mount.innerHTML = `
    <button class="back-link" id="back-admin">&larr; kembali ke panel admin</button>
    ${renderHero(`Menilai: <b style="color:var(--paper)">${escapeHtml(STATE.pesertaNama)}</b> &middot; NIK ${escapeHtml(STATE.pesertaNik)}`, {noBrand:true})}
    <div class="card">
      <div class="gauge-wrap">${gaugeSvg}<div class="gauge-score">${finalScore}</div><div class="gauge-cat cat-${cat.code}">${cat.label}</div></div>
      <div class="contrib-bar">${contribHtml}</div>
      ${skippedNote}
      <div class="hint" style="margin-top:12px;">Skor akhir = rata-rata tertimbang dari kelompok penilai yang sudah mengisi (Atasan 50% &middot; Rekan Kerja 30% &middot; Bawahan 20%, dihitung ulang proporsional bila ada kelompok yang kosong). Jawaban "tidak memiliki informasi yang cukup" tidak dihitung dalam rata-rata.</div>
    </div>
    <div class="card"><h2>Rincian per dimensi &mdash; Atasan</h2><table class="dim-table"><tbody>
      ${atasanDimRows.map(r=>`<tr><td style="width:55%">${r.title}<div class="bar-track"><div class="bar-fill" style="width:${r.s100||0}%"></div></div></td><td class="score-cell">${r.s100!=null?r.s100:'&ndash;'}</td></tr>`).join('')}
    </tbody></table></div>
    ${rekanCount>0 ? `<div class="card"><h2>Rincian per dimensi &mdash; Rekan Kerja (gabungan)</h2><table class="dim-table"><tbody>
      ${rekanDimRows.map(r=>`<tr><td style="width:55%">${r.title}<div class="bar-track"><div class="bar-fill" style="width:${r.s100||0}%"></div></div></td><td class="score-cell">${r.s100!=null?r.s100:'&ndash;'}</td></tr>`).join('')}
    </tbody></table></div>` : ''}
    ${bawahanCount>0 ? `<div class="card"><h2>Rincian per dimensi &mdash; Bawahan (gabungan)</h2><table class="dim-table"><tbody>
      ${bawahanDimRows.map(r=>`<tr><td style="width:55%">${r.title}<div class="bar-track"><div class="bar-fill" style="width:${r.s100||0}%"></div></div></td><td class="score-cell">${r.s100!=null?r.s100:'&ndash;'}</td></tr>`).join('')}
    </tbody></table></div>` : ''}
    ${ATASAN_OPEN.length>0 ? `<div class="card"><h2>Jawaban terbuka &mdash; Atasan</h2>${openAtasanHtml}</div>` : ''}
    ${(rekanCount>0 && REKAN_OPEN.length>0) ? `<div class="card"><h2>Jawaban terbuka &mdash; Rekan Kerja</h2>${openRekanHtml}</div>` : ''}
    ${(bawahanCount>0 && BAWAHAN_OPEN.length>0) ? `<div class="card"><h2>Jawaban terbuka &mdash; Bawahan</h2>${openBawahanHtml}</div>` : ''}
  `;
  mount.querySelector('#back-admin').addEventListener('click', ()=>{ STATE.view='adminPanel'; render(); });
}

function polar(cx,cy,r,angleDeg){ const a=angleDeg*Math.PI/180; return { x: cx+r*Math.cos(a), y: cy-r*Math.sin(a) }; }
function arcPath(cx,cy,r,scoreStart,scoreEnd){
  const degStart=180*(1-scoreStart/100), degEnd=180*(1-scoreEnd/100);
  const p1=polar(cx,cy,r,degStart), p2=polar(cx,cy,r,degEnd);
  return `M ${p1.x.toFixed(1)} ${p1.y.toFixed(1)} A ${r} ${r} 0 0 1 ${p2.x.toFixed(1)} ${p2.y.toFixed(1)}`;
}
function buildGauge(score){
  const cx=150, cy=140, r=112;
  const zones=[{a:0,b:70,color:'#B1493C'},{a:70,b:80,color:'#A97600'},{a:80,b:90,color:'#0B4A30'},{a:90,b:100,color:'#E3A400'}];
  const arcs = zones.map(z=>`<path d="${arcPath(cx,cy,r,z.a,z.b)}" stroke="${z.color}" stroke-width="16" fill="none"/>`).join('');
  const needleDeg = 180*(1-Math.max(0,Math.min(100,score))/100);
  const tip = polar(cx,cy,r-24,needleDeg);
  return `<svg width="300" height="160" viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
    ${arcs}
    <line x1="${cx}" y1="${cy}" x2="${tip.x.toFixed(1)}" y2="${tip.y.toFixed(1)}" stroke="#062E1E" stroke-width="3" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="7" fill="#062E1E"/>
  </svg>`;
}

(async ()=>{
  STORAGE_OK = await checkStorageHealth();
  render();
})();
</script>
